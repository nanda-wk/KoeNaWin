name: UAT Branch CI/CD

on:
   push:
      branches:
         - UAT

jobs:
   test:
      runs-on: macos-latest
      steps:
         - name: Checkout repository
           uses: actions/checkout@v3
         - name: Setup Fastlane
           uses: ruby/setup-ruby@v1
           with:
              ruby-version: "3.3"
              bundler-cache: true
         - name: Run Unit Tests
           run: bundle exec fastlane tests

   deploy_external:
      name: Deploy to External Testers
      needs: test
      runs-on: macos-latest
      steps:
         - name: Checkout repository
           uses: actions/checkout@v3
         - name: Setup Fastlane
           uses: ruby/setup-ruby@v1
           with:
              ruby-version: "3.3"
              bundler-cache: true
         - name: Checkout Fastlane Match Repository
           uses: actions/checkout@v3
           with:
              repository: nanda-wk/KoeNaWin-fastlane
              token: ${{ secrets.FASTLANE_MATCH_REPO_TOKEN }}
              path: fastlane-match-repo
              ref: master
         - name: Configure Git for Match
           run: |
              git config --global credential.helper store
              echo "https://x-oauth-basic:${{ secrets.FASTLANE_MATCH_REPO_TOKEN }}@github.com" > ~/.git-credentials
         - name: Build and Upload to External Testers
           run: bundle exec fastlane deploy_external
           env:
              APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
              APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
              APP_STORE_KEY_CONTENT: ${{ secrets.APP_STORE_KEY_CONTENT }}
              MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
              MATCH_KEYCHAIN_PASSWORD: ${{ secrets.MATCH_KEYCHAIN_PASSWORD }}
              FASTLANE_KEYCHAIN_NAME: fastlane_tmp.keychain
              FASTLANE_KEYCHAIN_PATH: ~/Library/Keychains/fastlane_tmp.keychain-db
              FASTLANE_USER: nandawinkyu.ix@gmail.com
           run: |
              echo "🔑 Creating temporary keychain..."
              security create-keychain -p "$MATCH_KEYCHAIN_PASSWORD" fastlane_tmp.keychain
              security default-keychain -s fastlane_tmp.keychain
              security unlock-keychain -p "$MATCH_KEYCHAIN_PASSWORD" fastlane_tmp.keychain
              security set-keychain-settings -lut 21600 fastlane_tmp.keychain

              echo "🚀 Running Fastlane lane: deploy_external"
              bundle exec fastlane deploy_external
